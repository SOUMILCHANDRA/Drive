<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive | Night Drive</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="flash" class="screen-flash"></div>
    <div id="app">
      <!-- 🎬 Start Screen -->
      <div id="startScreen">
        <div class="splash-content">
          <h1 id="logo" class="splash-logo">DRIVE</h1>
          <p class="start-text">CLICK TO IGNITE</p>
          <p class="controls-text">WASD / ARROWS TO STEER</p>
        </div>
      </div>

      <!-- HUD Overlay (Minimal Documentary Style) -->
      <div id="hud" class="hud" style="display: none;">
        <div class="hud-content">
          <div class="hud-item">KM/H: <span id="speed-val">0</span></div>
          <div class="hud-item">DIST: <span id="dist-val">0</span>M</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
