<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive | Procedural Adventure</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="flash" class="screen-flash"></div>
    <div id="app">
      <!-- Splash Screen -->
      <div id="splash" class="splash-screen">
        <div class="splash-content">
          <h1 class="splash-logo">Drive</h1>
          <p class="splash-cta">CLICK TO START</p>
        </div>
      </div>

      <!-- HUD Overlay (Initially hidden) -->
      <div id="hud" class="hud" style="display: none;">
        <div class="hud-top">
          <div class="title">Neon Drive</div>
          <div class="stats">
            <div class="stat-item">Distance: <span id="dist-val" class="stat-value">0</span> m</div>
            <div class="stat-item">Elevation: <span id="elev-val" class="stat-value">0</span> m</div>
          </div>
        </div>
        <div class="hud-bottom">
          <div id="antigrav-warn" class="antigrav-indicator" style="display: none;">ANTI-GRAVITY</div>
          
          <div class="gauge-container">
            <svg class="speed-gauge" viewBox="0 0 200 100">
               <path class="gauge-bg" d="M 20 90 A 80 80 0 0 1 180 90" fill="none" stroke="#1a1a1a" stroke-width="10" />
               <path id="gauge-fill" class="gauge-fill" d="M 20 90 A 80 80 0 0 1 180 90" fill="none" stroke="#00f3ff" stroke-width="10" stroke-dasharray="251" stroke-dashoffset="251" />
            </svg>
            <div class="speedometer">
              <span id="speed-val" class="speed-value">0</span>
              <span class="speed-unit">km/h</span>
            </div>
          </div>

          <div class="boost-container">
            <div class="boost-label">BOOST</div>
            <div class="boost-bar-bg">
              <div id="boost-fill" class="boost-bar-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
